<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/watchgram_logo2.png">
    <title>WatchGram - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1419 100%);
            color: #E8E8E8;
            position: relative;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* Navigation */
        nav {
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 0 40px rgba(192, 192, 192, 0.2);
            border-bottom: 2px solid rgba(192, 192, 192, 0.2);
        }

        .nav-container {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 25%, #FFFFFF 50%, #C0C0C0 75%, #E8E8E8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        .back-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%, #A9A9A9 100%);
            color: black;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #FFFFFF 0%, #E8E8E8 50%, #C0C0C0 100%);
        }

        /* Chat Container */
        .chat-container {
            max-width: 80rem;
            margin: 0 auto;
            height: calc(100vh - 70px);
            display: flex;
            background: rgba(30, 30, 45, 0.9);
            overflow: hidden; 
        }

        /* Sidebar - Liste des conversations */
        .chat-sidebar {
            width: 350px;
            border-right: 1px solid rgba(192, 192, 192, 0.08);
            display: flex;
            flex-direction: column;
            background: rgba(30, 30, 45, 0.95);
        }

        .sidebar-header {
            padding: 1.25rem;
            border-bottom: 1px solid #3c3c3c;
        }

        .sidebar-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #C0C0C0;
            margin-bottom: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 9999px;
            border: 1px solid rgba(192, 192, 192, 0.08);
            background: rgba(255, 255, 255, 0.02);
            color: #EAEAEA;
            outline: none;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: #C0C0C0;
        }

        .search-box input::placeholder {
            color: #9ca3af;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: #9ca3af;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
        }

        .conversation-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #3c3c3c;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .conversation-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .conversation-item.active {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #C0C0C0;
        }

        .conversation-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #E8E8E8, #C0C0C0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            color: black;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 0 12px rgba(192, 192, 192, 0.15);
        }

        .online-indicator {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border: 2px solid rgb(38, 38, 38);
            border-radius: 50%;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .conversation-name {
            font-weight: 600;
            color: #EAEAEA;
        }

        .conversation-time {
            font-size: 0.75rem;
            color: #A9A9A9;
        }

        .conversation-preview {
            font-size: 0.875rem;
            color: #A9A9A9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #C0C0C0;
            color: black;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(192, 192, 192, 0.06);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(30, 30, 45, 0.95);
        }

        .chat-user-info {
            flex: 1;
        }

        .chat-user-name {
            font-weight: 600;
            font-size: 1.1rem;
            color: #C0C0C0;
        }

        .chat-user-status {
            font-size: 0.875rem;
            color: #10b981;
        }

        .chat-actions {
            display: flex;
            gap: 0.5rem;
        }

        .chat-action-btn {
            padding: 0.5rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .chat-action-btn:hover {
            background: rgb(50, 50, 50);
        }

        .chat-action-btn svg {
            width: 20px;
            height: 20px;
            stroke: #C0C0C0;
        }

        /* Messages Area */
        .messages-container {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-group.sent {
            align-items: flex-end;
        }

        .message-group.received {
            align-items: flex-start;
        }

        .message {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            word-wrap: break-word;
        }

        .message.sent {
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%);
            color: black;
            border-bottom-right-radius: 0.25rem;
        }

        .message.received {
            background: rgba(255, 255, 255, 0.03);
            color: #EAEAEA;
            border-bottom-left-radius: 0.25rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: #A9A9A9;
            margin-top: 0.25rem;
        }

        .date-divider {
            text-align: center;
            margin: 1.5rem 0;
        }

        .date-divider span {
            background: rgb(55, 55, 55);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 1rem;
            background: rgb(55, 55, 55);
            border-radius: 1rem;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-10px);
            }
        }

        /* Input Area */
        .message-input-container {
            padding: 1.25rem;
            border-top: 1px solid rgba(30, 30, 45, 0.9);
            background: rgba(15, 15, 30, 0.9);
        }

        .message-input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-actions {
            display: flex;
            gap: 0.5rem;
        }

        .input-action-btn {
            padding: 0.5rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .input-action-btn:hover {
            background: rgb(50, 50, 50);
        }

        .input-action-btn svg {
            width: 22px;
            height: 22px;
            stroke: rgb(250, 250, 249);
        }

        .message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 1.5rem;
            border: 1px solid #3c3c3c;
            background: rgba(30, 30, 45, 0.9);
            color: white;
            outline: none;
            resize: none;
            max-height: 120px;
            min-height: 44px;
            font-family: inherit;
        }

        .message-input:focus {
            border-color: rgb(253, 253, 253);
        }

        .message-input::placeholder {
            color: #9ca3af;
        }

        .send-message-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            border: none;
            background: rgb(252, 252, 250);
            color: black;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-message-btn:hover {
            background: rgb(252, 252, 251);
        }

        .send-message-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 1rem;
            color: #9ca3af;
        }

        .empty-chat svg {
            width: 80px;
            height: 80px;
            stroke: #6b7280;
        }

        .empty-chat h3 {
            font-size: 1.5rem;
            color: rgb(246, 246, 244);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                height: calc(100vh - 60px);
            }

            .chat-sidebar {
                width: 100%;
                position: absolute;
                height: 100%;
                z-index: 10;
                transition: transform 0.3s;
            }

            .chat-sidebar.hidden-mobile {
                transform: translateX(-100%);
            }

            .chat-area {
                width: 100%;
            }

            .message {
                max-width: 85%;
            }

            .back-to-list-btn {
                display: block;
            }
        }

        @media (min-width: 769px) {
            .back-to-list-btn {
                display: none;
            }
        }

        .back-to-list-btn {
            padding: 0.5rem;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .back-to-list-btn:hover {
            background: rgb(50, 50, 50);
        }

        .back-to-list-btn svg {
            width: 20px;
            height: 20px;
            stroke: rgb(251, 251, 249);
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <h1 class="nav-logo" onclick="goBack()">WatchGram</h1>
            <button class="back-btn" onclick="window.location.href='home.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Retour
            </button>

        </div>
    </nav>

    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">Messages</h2>
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" placeholder="Rechercher une conversation..." id="searchInput"
                        oninput="filterConversations()">
                </div>
            </div>
            <div class="conversations-list" id="conversationsList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="empty-chat" id="emptyChat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>Vos Messages</h3>
                <p>Sélectionnez une conversation pour commencer à discuter</p>
            </div>

            <div class="hidden" id="activeChat">
                <div class="chat-header">
                    <button class="back-to-list-btn" onclick="showSidebar()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <div class="conversation-avatar" id="activeChatAvatar"></div>
                    <div class="chat-user-info">
                        <div class="chat-user-name" id="activeChatName"></div>
                        <div class="chat-user-status" id="activeChatStatus">En ligne</div>
                    </div>
                    <div class="chat-actions">
                        <button class="chat-action-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            </svg>
                        </button>
                        <button class="chat-action-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="1"></circle>
                                <circle cx="12" cy="5" r="1"></circle>
                                <circle cx="12" cy="19" r="1"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="messages-container" id="messagesContainer"></div>

                <div class="message-input-container">
                    <div class="message-input-wrapper">
                        <div class="input-actions">
                            <button class="input-action-btn" onclick="attachImage()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </button>
                            <button class="input-action-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path
                                        d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                                    </path>
                                </svg>
                            </button>
                        </div>
                        <textarea class="message-input" id="messageInput" placeholder="Écrivez un message..." rows="1"
                            oninput="autoResize(this)"></textarea>
                        <button class="send-message-btn" id="sendBtn" onclick="sendMessage()">Envoyer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Données de démo
        let currentUser = 'User1';
        let activeConversationId = null;
        let conversations = [
            {
                id: 1,
                user: 'watchlover92',
                avatar: 'W',
                lastMessage: 'Magnifique collection ! Tu as le Submariner ?',
                time: '10:30',
                unread: 2,
                online: true,
                messages: [
                    { id: 1, sender: 'watchlover92', text: 'Salut ! J\'ai vu ta collection sur ton profil', time: '10:15', sent: false },
                    { id: 2, sender: 'User1', text: 'Merci ! Oui je collectionne depuis quelques années', time: '10:20', sent: true },
                    { id: 3, sender: 'watchlover92', text: 'Magnifique collection ! Tu as le Submariner ?', time: '10:30', sent: false }
                ]
            },
            {
                id: 2,
                user: 'luxurywatch',
                avatar: 'L',
                lastMessage: 'Je viens de recevoir ma nouvelle Omega',
                time: '09:45',
                unread: 0,
                online: true,
                messages: [
                    { id: 1, sender: 'luxurywatch', text: 'Hello ! Comment vas-tu ?', time: '09:30', sent: false },
                    { id: 2, sender: 'User1', text: 'Très bien merci ! Et toi ?', time: '09:35', sent: true },
                    { id: 3, sender: 'luxurywatch', text: 'Je viens de recevoir ma nouvelle Omega', time: '09:45', sent: false }
                ]
            },
            {
                id: 3,
                user: 'collector_time',
                avatar: 'C',
                lastMessage: 'On se fait un échange ?',
                time: 'Hier',
                unread: 0,
                online: false,
                messages: [
                    { id: 1, sender: 'collector_time', text: 'Ton Speedmaster est à vendre ?', time: 'Hier 15:30', sent: false },
                    { id: 2, sender: 'User1', text: 'Non désolé, je la garde précieusement', time: 'Hier 16:00', sent: true },
                    { id: 3, sender: 'collector_time', text: 'On se fait un échange ?', time: 'Hier 16:15', sent: false }
                ]
            },
            {
                id: 4,
                user: 'moonwatch',
                avatar: 'M',
                lastMessage: 'Merci pour les conseils !',
                time: 'Hier',
                unread: 0,
                online: false,
                messages: [
                    { id: 1, sender: 'moonwatch', text: 'Salut ! Je débute dans l\'horlogerie', time: 'Hier 14:00', sent: false },
                    { id: 2, sender: 'User1', text: 'Bienvenue ! N\'hésite pas si tu as des questions', time: 'Hier 14:30', sent: true },
                    { id: 3, sender: 'moonwatch', text: 'Merci pour les conseils !', time: 'Hier 15:00', sent: false }
                ]
            }
        ];

        // Render conversations list
        function renderConversations(filter = '') {
            const list = document.getElementById('conversationsList');
            const filtered = conversations.filter(conv =>
                conv.user.toLowerCase().includes(filter.toLowerCase())
            );

            list.innerHTML = filtered.map(conv => `
                <div class="conversation-item ${activeConversationId === conv.id ? 'active' : ''}" 
                     onclick="openConversation(${conv.id})">
                    <div class="conversation-avatar">
                        ${conv.avatar}
                        ${conv.online ? '<div class="online-indicator"></div>' : ''}
                    </div>
                    <div class="conversation-info">
                        <div class="conversation-header">
                            <span class="conversation-name">${conv.user}</span>
                            <span class="conversation-time">${conv.time}</span>
                        </div>
                        <div class="conversation-preview">${conv.lastMessage}</div>
                    </div>
                    ${conv.unread > 0 ? `<div class="unread-badge">${conv.unread}</div>` : ''}
                </div>
            `).join('');
        }

        // Open a conversation
        function openConversation(id) {
            activeConversationId = id;
            const conv = conversations.find(c => c.id === id);

            // Mark as read
            conv.unread = 0;

            // Update UI
            document.getElementById('emptyChat').classList.add('hidden');
            document.getElementById('activeChat').classList.remove('hidden');

            // Update header
            document.getElementById('activeChatAvatar').innerHTML = conv.avatar + (conv.online ? '<div class="online-indicator"></div>' : '');
            document.getElementById('activeChatName').textContent = conv.user;
            document.getElementById('activeChatStatus').textContent = conv.online ? 'En ligne' : 'Hors ligne';

            // Render messages
            renderMessages(conv.messages);

            // Update conversations list
            renderConversations();

            // Hide sidebar on mobile
            if (window.innerWidth <= 768) {
                document.getElementById('chatSidebar').classList.add('hidden-mobile');
            }
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('messagesContainer');
            let html = '<div class="date-divider"><span>Aujourd\'hui</span></div>';

            messages.forEach((msg, index) => {
                const isSent = msg.sender === currentUser;
                const showTime = index === messages.length - 1 || messages[index + 1].sender !== msg.sender;

                html += `
                    <div class="message-group ${isSent ? 'sent' : 'received'}">
                        <div class="message ${isSent ? 'sent' : 'received'}">
                            ${msg.text}
                        </div>
                        ${showTime ? `<div class="message-time">${msg.time}</div>` : ''}
                    </div>
                `;
            });

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // Send message
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text || !activeConversationId) return;

            const conv = conversations.find(c => c.id === activeConversationId);
            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                text: text,
                time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
                sent: true
            };

            conv.messages.push(newMessage);
            conv.lastMessage = text;
            conv.time = newMessage.time;

            renderMessages(conv.messages);
            renderConversations();

            input.value = '';
            input.style.height = '44px';

            // Simulate typing indicator and response (demo only)
            setTimeout(() => simulateTyping(), 1000);
        }

        // Simulate typing indicator
        function simulateTyping() {
            const container = document.getElementById('messagesContainer');
            const typingHtml = `
                <div class="message-group received" id="typingIndicator">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            container.innerHTML += typingHtml;
            container.scrollTop = container.scrollHeight;

            // Remove typing and add response after delay
            setTimeout(() => {
                document.getElementById('typingIndicator')?.remove();
                receiveMessage();
            }, 2000);
        }

        // Receive message (demo)
        function receiveMessage() {
            if (!activeConversationId) return;

            const conv = conversations.find(c => c.id === activeConversationId);
            const responses = [
                'C\'est super intéressant !',
                'Je suis d\'accord avec toi',
                'Tu as raison !',
                'Génial, merci pour l\'info',
                'Excellente question !'
            ];

            const newMessage = {
                id: Date.now(),
                sender: conv.user,
                text: responses[Math.floor(Math.random() * responses.length)],
                time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
                sent: false
            };

            conv.messages.push(newMessage);
            conv.lastMessage = newMessage.text;
            conv.time = newMessage.time;

            renderMessages(conv.messages);
            renderConversations();
        }

        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = '44px';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        // Filter conversations
        function filterConversations() {
            const filter = document.getElementById('searchInput').value;
            renderConversations(filter);
        }

        // Show sidebar (mobile)
        function showSidebar() {
            document.getElementById('chatSidebar').classList.remove('hidden-mobile');
        }

        // Go back
        function goBack() {
            window.location.href = 'index.html';
        }

        // Attach image (placeholder)
        function attachImage() {
            alert('Fonctionnalité d\'envoi d\'image - À implémenter avec le backend');
        }

        // Enter key to send
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('messageInput');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            renderConversations();
        });
    </script>
</body>

</html>
