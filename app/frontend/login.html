<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/watchgram_logo2.png">
    <title>Watchgram - Connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1419 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(192, 192, 192, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(169, 169, 169, 0.15) 0%, transparent 50%);
            animation: shimmer 8s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10%, -10%); }
        }

        .money-rain {
            position: absolute;
            font-size: 40px;
            opacity: 0.4;
            animation: fall 12s linear infinite;
            filter: drop-shadow(0 0 10px rgba(192, 192, 192, 0.5));
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 0.4;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .money-1 { left: 5%; animation-delay: 0s; }
        .money-2 { left: 20%; animation-delay: 3s; }
        .money-3 { left: 35%; animation-delay: 1.5s; }
        .money-4 { left: 50%; animation-delay: 4s; }
        .money-5 { left: 65%; animation-delay: 2s; }
        .money-6 { left: 80%; animation-delay: 5s; }
        .money-7 { left: 95%; animation-delay: 2.5s; }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 50px;
            width: 450px;
            box-shadow: 
                0 0 60px rgba(192, 192, 192, 0.4),
                0 0 100px rgba(169, 169, 169, 0.3),
                inset 0 0 80px rgba(192, 192, 192, 0.08);
            border: 2px solid rgba(192, 192, 192, 0.4);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 25%, #FFFFFF 50%, #C0C0C0 75%, #E8E8E8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% auto;
            letter-spacing: 3px;
            font-weight: bold;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 20px rgba(192, 192, 192, 0.6));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .logo p {
            color: #B8B8B8;
            font-size: 14px;
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.3);
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #C0C0C0;
            font-size: 13px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(192, 192, 192, 0.3);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #C0C0C0;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.4);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .forgot-password {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 30px;
        }

        .forgot-password a {
            color: #A9A9A9;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            color: #E8E8E8;
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%, #A9A9A9 100%);
            border: none;
            border-radius: 15px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(192, 192, 192, 0.5);
            position: relative;
            overflow: hidden;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(192, 192, 192, 0.7);
            background: linear-gradient(135deg, #FFFFFF 0%, #E8E8E8 50%, #C0C0C0 100%);
        }

        .divider {
            text-align: center;
            margin: 35px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(192, 192, 192, 0.4), transparent);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            color: #B8B8B8;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .signup-link {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .signup-link a {
            color: #C0C0C0;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            color: #FFFFFF;
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.5);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .dollar-bg {
            position: absolute;
            font-size: 100px;
            opacity: 0.03;
            color: #C0C0C0;
            z-index: 0;
        }

        .dollar-1 { top: 10%; left: 10%; transform: rotate(-15deg); }
        .dollar-2 { top: 70%; right: 15%; transform: rotate(20deg); }
        .dollar-3 { bottom: 15%; left: 20%; transform: rotate(10deg); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <h1>WATCHGRAM</h1>
            <p>Login</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="votre_nom" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="forgot-password">
                <a href="#">Mot de passe oublié ?</a>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Se connecter</button>
            
            <div class="signup-link">
                Pas encore de compte ? <a href="creataccount.html">S'inscrire</a>
            </div>
        </form>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api'; // Change this to your backend URL
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }

            // Disable button during request
            loginBtn.disabled = true;
            loginBtn.textContent = 'Connexion...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Échec de la connexion');
                }

                // Store authentication data
                localStorage.setItem('watchgram_token', data.token);
                localStorage.setItem('watchgram_username', data.username);
                localStorage.setItem('watchgram_currentUser', username);

                // Redirect to home page
                window.location.href = 'home.html';

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Erreur de connexion. Vérifiez vos identifiants.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
