<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/watchgram_logo2.png">
    <title>WatchGram - Créer un Post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1419 100%);
            color: #E8E8E8;
            position: relative;
            overflow-x: hidden;
        }

        nav {
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 0 40px rgba(192, 192, 192, 0.2);
            border-bottom: 2px solid rgba(192, 192, 192, 0.2);
        }

        .nav-container {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 25%, #FFFFFF 50%, #C0C0C0 75%, #E8E8E8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        .nav-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%, #A9A9A9 100%);
            color: black;
            box-shadow: 0 10px 15px -3px rgba(192, 192, 192, 0.2);
        }

        .nav-btn:hover {
            background: linear-gradient(135deg, #FFFFFF 0%, #E8E8E8 50%, #C0C0C0 100%);
        }

        .container {
            max-width: 50rem;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: bold;
            color: #E8E8E8;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-card {
            background: rgba(30, 30, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.2);
            border: 1px solid rgba(192, 192, 192, 0.2);
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #E8E8E8;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-weight: 600;
            color: #C0C0C0;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #3c3c3c;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            background: transparent;
            color: #f6f7f8;
        }

        .form-input:focus {
            border-color: #C0C0C0;
            box-shadow: 0 0 0 6px rgba(192,192,192,0.06);
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .upload-area {
            border: 2px dashed #2c2c2c;
            border-radius: 0.75rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: rgba(192,192,192,0.5);
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-area.dragover {
            border-color: rgba(192,192,192,0.6);
            background: rgba(192,192,192,0.02);
        }

        .upload-icon {
            width: 3rem;
            height: 3rem;
            stroke: #C0C0C0;
            margin: 0 auto 1rem;
        }

        .upload-text {
            color: #C0C0C0;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .upload-subtext {
            color: #A9A9A9;
            font-size: 0.875rem;
        }

        .file-input {
            display: none;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid #111010;
            background: rgba(0,0,0,0.15);
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-preview {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 2rem;
            height: 2rem;
            background: rgba(239, 68, 68, 0.9);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .remove-preview:hover {
            background: #ffffff;
            transform: scale(1.1);
        }

        .remove-preview svg {
            stroke: white;
        }

        .preview-badge {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            background: #ffbf00;
            color: black;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px solid #eff6ff;
        }

        .btn {
            flex: 1;
            padding: 0.875rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #b7b7b7;
            color: black;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            font-weight: 700;
        }

        .btn-primary:hover:not(:disabled) {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:disabled {
            background: #696363;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #000000;
            color: #ffffff;
        }

        .btn-secondary:hover {
            background: #4b4b4b;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .success-modal.show {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .success-modal.show .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            width: 4rem;
            height: 4rem;
            background: #ffbf00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .modal-icon svg {
            stroke: white;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .modal-text {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 1rem auto;
            }

            .form-card {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <h1 class="nav-logo" onclick="goBack()">WatchGram</h1>
            <button class="nav-btn" onclick="goBack()">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Retour au Feed
            </button>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Créer un Post de Montre</h1>

        <div class="form-card">
            <form id="watchForm">
                <div class="form-section">
                    <div class="section-title">
                        Photos de la Montre
                    </div>
                    
                    <div class="upload-area" id="uploadArea">
                        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <p class="upload-text">Cliquez ou glissez des images ici</p>
                        <p class="upload-subtext">PNG, JPG jusqu'à 10MB (Max 5 images)</p>
                        <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
                    </div>

                    <div class="preview-grid" id="previewGrid"></div>
                </div>

                <div class="form-section">
                    <div class="section-title">
                        Informations de Base
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Nom de la Montre *</label>
                        <input type="text" class="form-input" id="watchName" placeholder="ex: Submariner Date" required>
                        <span class="error-message" id="nameError"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Marque *</label>
                        <input type="text" class="form-input" id="brandName" placeholder="ex: Rolex" required>
                        <span class="error-message" id="brandError"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-input form-textarea" id="description" placeholder="Décrivez votre montre..."></textarea>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title">
                        Prix et Caractéristiques
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Prix (€) *</label>
                            <input type="number" class="form-input" id="price" placeholder="5000" min="0" required>
                            <span class="error-message" id="priceError"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Diamètre (mm) *</label>
                            <input type="number" class="form-input" id="diameter" placeholder="40" min="0" step="0.1" required>
                            <span class="error-message" id="diameterError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Épaisseur (mm)</label>
                            <input type="number" class="form-input" id="thickness" placeholder="11.5" min="0" step="0.1">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Étanchéité (m)</label>
                            <input type="number" class="form-input" id="waterResistance" placeholder="300" min="0">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Mouvement *</label>
                            <input type="text" class="form-input" id="movement" placeholder="ex: Automatique" required>
                            <span class="error-message" id="movementError"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Matériau</label>
                            <input type="text" class="form-input" id="material" placeholder="ex: Acier inoxydable">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                        </svg>
                        Réinitialiser
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M22 2L11 13"></path>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                        Publier
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="success-modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2 class="modal-title">Post Publié !</h2>
            <p class="modal-text">Votre montre a été ajoutée avec succès au feed</p>
            <button class="btn btn-primary" onclick="closeModal()">
                Super !
            </button>
        </div>
    </div>

    <script>
        // ============================================
        // API CONFIGURATION
        // ============================================
        const API_URL = 'http://localhost:3000/api';

        function getAuthToken() {
            return localStorage.getItem('watchgram_token');
        }

        function getAuthHeaders() {
            const token = getAuthToken();
            return {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            };
        }

        // ============================================
        // IMAGE UPLOAD HANDLING
        // ============================================
        let uploadedImages = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewGrid = document.getElementById('previewGrid');
        const form = document.getElementById('watchForm');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const maxFiles = 5;
            const maxSize = 10 * 1024 * 1024;

            for (let file of files) {
                if (uploadedImages.length >= maxFiles) {
                    alert(`Maximum ${maxFiles} images autorisées`);
                    break;
                }

                if (file.size > maxSize) {
                    alert(`${file.name} est trop volumineux (max 10MB)`);
                    continue;
                }

                if (!file.type.startsWith('image/')) {
                    alert(`${file.name} n'est pas une image valide`);
                    continue;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedImages.push(e.target.result);
                    renderPreviews();
                };
                reader.readAsDataURL(file);
            }
        }

        function renderPreviews() {
            previewGrid.innerHTML = uploadedImages.map((img, idx) => `
                <div class="preview-item">
                    ${idx === 0 ? '<div class="preview-badge">Principal</div>' : ''}
                    <img src="${img}" alt="Preview ${idx + 1}" class="preview-image">
                    <button type="button" class="remove-preview" onclick="removeImage(${idx})">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderPreviews();
        }

        // ============================================
        // FORM SUBMISSION
        // ============================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errors = {};
            
            if (!document.getElementById('watchName').value.trim()) {
                errors.nameError = 'Le nom est requis';
            }
            
            if (!document.getElementById('brandName').value.trim()) {
                errors.brandError = 'La marque est requise';
            }
            
            const price = document.getElementById('price').value;
            if (!price || price <= 0) {
                errors.priceError = 'Prix invalide';
            }
            
            const diameter = document.getElementById('diameter').value;
            if (!diameter || diameter <= 0) {
                errors.diameterError = 'Diamètre invalide';
            }
            
            if (!document.getElementById('movement').value.trim()) {
                errors.movementError = 'Le mouvement est requis';
            }

            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));

            if (Object.keys(errors).length > 0) {
                for (let [field, message] of Object.entries(errors)) {
                    document.getElementById(field).textContent = message;
                    const input = document.getElementById(field.replace('Error', ''));
                    if (input) input.classList.add('error');
                }
                return;
            }

            if (uploadedImages.length === 0) {
                alert('Veuillez ajouter au moins une image');
                return;
            }

            // Disable submit button
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnHTML = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
                    <path d="M4 12a8 8 0 018-8" stroke-opacity="0.75"></path>
                </svg>
                Création en cours...
            `;

            const watchData = {
                name: document.getElementById('watchName').value.trim(),
                brand: document.getElementById('brandName').value.trim(),
                price: parseFloat(document.getElementById('price').value),
                diameter: parseFloat(document.getElementById('diameter').value),
                thickness: parseFloat(document.getElementById('thickness').value) || null,
                waterResistance: parseInt(document.getElementById('waterResistance').value) || null,
                movement: document.getElementById('movement').value.trim(),
                material: document.getElementById('material').value.trim() || 'Non spécifié',
                images: uploadedImages
            };

            try {
                console.log('📤 Envoi des données:', watchData);
                
                const response = await fetch(`${API_URL}/post`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify(watchData)
                });

                console.log('📡 Response status:', response.status);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Erreur lors de la création du post');
                }

                const newPost = await response.json();
                console.log('✅ Post créé:', newPost);

                // Show success modal
                showSuccessModal();
                
            } catch (error) {
                console.error('❌ Erreur:', error);
                alert('Erreur lors de la publication: ' + error.message);
                
                // Re-enable submit button
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHTML;
            }
        });

        // ============================================
        // HELPER FUNCTIONS
        // ============================================
        function showSuccessModal() {
            document.getElementById('successModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('successModal').classList.remove('show');
            setTimeout(() => {
                window.location.href = 'home.html';  // Redirect to home
            }, 300);
        }

        function resetForm() {
            form.reset();
            uploadedImages = [];
            renderPreviews();
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
        }

        function goBack() {
            window.location.href = 'home.html';
        }

        // Check if user is logged in
        const token = getAuthToken();
        if (!token) {
            alert('Vous devez être connecté pour créer un post');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
