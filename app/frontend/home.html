<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchGram</title>
    <link rel="icon" type="image/png" href="/assets/icons/watchgram_logo2.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1419 100%);
            position: relative;
            overflow-x: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* navigation */
        nav {
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 0 40px rgba(192, 192, 192, 0.2);
            border-bottom: 2px solid rgba(192, 192, 192, 0.2);
       
        }

        .nav-container {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0.5rem 1rem;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .nav-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            width: 100%;
        }

        .nav-bottom {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 25%, #FFFFFF 50%, #C0C0C0 75%, #E8E8E8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 15px rgba(192, 192, 192, 0.4));
        
        }

        .nav-buttons {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-top-right {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .account-wrapper {
            position: relative;
        }

        .nav-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            background: transparent;
        }

        .nav-btn.active {
           background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%, #A9A9A9 100%);
            color: black;
            box-shadow: 0 10px 20px rgba(192, 192, 192, 0.4);
        }

        .nav-btn.inactive {
            color: #C0C0C0;
            background: transparent;
            border: 1px solid rgba(192, 192, 192, 0.3);
        
        }

        .nav-btn.inactive:hover {
            background: rgba(192, 192, 192, 0.1);
            border-color: #C0C0C0;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.3);
        
        }

        .nav-btn.icon-only {
            width: 44px;
            height: 44px;
            padding: 0;
            min-width: 44px;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .nav-btn svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        /* Badge notification pour le bouton chat */
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            border: 2px solid rgba(15, 15, 30, 0.9);
            z-index: 1;
        }

        /* Menu account */
        .account-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 0.5rem);
            background: rgba(30, 30, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 0.75rem;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.3);
            border: 2px solid rgba(192, 192, 192, 0.3);
            min-width: 12rem;
            padding: 0.4rem;
            z-index: 60;
        }

        .account-menu .account-name {
            padding: 0.6rem;
            border-bottom: 1px solid rgba(192, 192, 192, 0.2);
            font-weight: 700;
            color: #E8E8E8;
        }

        .account-menu button {
            width: 100%;
            text-align: left;
            padding: 0.5rem 0.6rem;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 0.375rem;
            font-weight: 600;
            color: #E8E8E8;
        }

        .account-menu button:hover {
            background: rgba(109, 109, 109, 0.2);
            color: #FFFFFF;
        }

        /* Post Menu */
        .post-menu {
            position: absolute;
            right: 1rem;
            top: calc(100% + 0.5rem);
            background: rgba(30, 30, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 0.75rem;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.3);
            border: 2px solid rgba(192, 192, 192, 0.3);
            min-width: 10rem;
            padding: 0.4rem;
            z-index: 60;
        }

        .post-menu button {
            width: 100%;
            text-align: left;
            padding: 0.5rem 0.6rem;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 0.375rem;
            font-weight: 600;
            color: #E8E8E8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .post-menu button:hover {
            background: rgba(109, 109, 109, 0.2);
            color: #FFFFFF;
        }

        .post-menu button.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .post-menu button svg {
            width: 16px;
            height: 16px;
        }

        .post-header-right {
            position: relative;
        }

        /* feed */
        .feed-container {
            max-width: 42rem;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        .post {
            background: rgba(30, 30, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.2);
            border: 2px solid rgba(192, 192, 192, 0.2);
        
            
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid rgba(192, 192, 192, 0.1);
       
        }

        .post-header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .post-avatar {
           width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #E8E8E8, #C0C0C0);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.4);
       }

        .post-user-info p:first-child {
            font-weight: 600;
           color: #E8E8E8;
        }

        .post-user-info p:last-child {
            font-size: 0.75rem;
            color: #A9A9A9;
        }

        .post-more {
            border: none;
            background: none;
            cursor: pointer;
            color: #C0C0C0;
            font-size: 1.5rem;
        }

        .post-more:hover {
            color: #FFFFFF;
        }

        .post-image-container {
            position: relative;
           background: #0a0a0a;
        }

        .post-image {
            width: 100%;
            height: 24rem;
            object-fit: cover;
        }

        .image-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(232, 232, 232, 0.95);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.5);
            font-size: 1rem;
            transition: all 0.3s;
       }

        .image-nav-btn:hover {
            background: #FFFFFF;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.8);
        }

        .image-nav-btn svg {
            width: 14px;
            height: 14px;
             stroke: #000;
            stroke-width: 2;
            fill: none;
        }

        .image-nav-btn.prev {
            left: 0.5rem;
        }

        .image-nav-btn.next {
            right: 0.5rem;
        }

        .image-indicators {
            position: absolute;
            bottom: 0.75rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.25rem;
         }

        .indicator {
            width: 0.375rem;
            height: 0.375rem;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .indicator.active {
            background: #C0C0C0;
            width: 1.5rem;
            box-shadow: 0 0 10px rgba(192, 192, 192, 0.6);
          }

        .indicator.inactive {
           background: rgba(192, 192, 192, 0.3);
        }

        .post-actions {
            padding: 1rem;
        }

        .actions-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .actions-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .action-btn {
            border: none;
            background: none;
            cursor: pointer;
            padding: 0;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(1.25);
        }

        .action-btn:hover .icon {
            stroke: #FFFFFF;
            filter: drop-shadow(0 0 5px rgba(192, 192, 192, 0.5));
        }

        .icon {
             width: 1.75rem;
            height: 1.75rem;
            stroke: #C0C0C0;
            fill: none;
            stroke-width: 2;
            transition: all 0.2s;}

        .icon.liked {
           fill: #ef4444;
            stroke: #ef4444;
        }

        .icon.saved {
             fill: #C0C0C0;
            stroke: #C0C0C0;
        }

        .compare-btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 1rem;
        }

        .compare-btn.added {
            background: rgba(192, 192, 192, 0.3);
            color: #E8E8E8;
            border: 1px solid rgba(192, 192, 192, 0.5);
         }

        .compare-btn.not-added {
            background: linear-gradient(135deg, #E8E8E8, #C0C0C0);
            color: #000;
            box-shadow: 0 5px 15px rgba(192, 192, 192, 0.3);
        }

        .compare-btn.not-added:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(192, 192, 192, 0.5);
         }

        .likes-count {
           font-weight: 600;
            color: #E8E8E8;
            margin-bottom: 0.5rem;
        }

        .post-description {
             margin-bottom: 0.75rem;
            color: #C0C0C0;
        }

        .post-description .brand {
           font-weight: 600;
            color: #E8E8E8;
        }

        .post-description .details {
             color: #B8B8B8;
        }

        .comments-section {
            margin-bottom: 0.75rem;
        }

        .comment {
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .comment .username {
            font-weight: 600;
            color: #E8E8E8;
        }

        .comment .text {
            color: #B8B8B8;
        }

        .post-time {
            font-size: 0.75rem;
            color: #808080;
            margin-bottom: 0.75rem;
        }

        .add-comment {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(192, 192, 192, 0.1);
        }

        .add-comment input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.875rem;
            background: transparent;
            color: #E8E8E8;
         }

        .add-comment input::placeholder {
            color: #808080;
        }

        .send-btn {
             border: none;
            background: none;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            transition: all 0.2s;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .send-btn.active {
             color: #C0C0C0;
        }

        .send-btn.active:hover {
           color: #FFFFFF;
        }

        .send-btn.inactive {
            color: #505050;
        }

        /* page (Favoris et Comparaison) */
        .page-container {
            max-width: 80rem;
            margin: 0 auto;
            padding: 2rem 1rem;
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: bold;
            color: #E8E8E8;
            margin-bottom: 2rem;
            text-align: center;
            text-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
       }

        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
        }

        .empty-icon {
            width: 4rem;
            height: 4rem;
            stroke: #C0C0C0;
            margin: 0 auto 1rem; }

        .empty-text {
             color: #C0C0C0;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        

        .empty-btn:hover {
            background: rgb(93, 93, 93);
        }

        .watch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        
        }

        .watch-card {
            background: rgba(30, 30, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.2);
            border: 2px solid rgba(192, 192, 192, 0.2);
            transition: all 0.3s;
       }

        .watch-card:hover {
              box-shadow: 0 0 40px rgba(192, 192, 192, 0.4);
            transform: translateY(-5px);
        }

        .watch-image-container {
            position: relative;
        }

        .watch-image {
            width: 100%;
            height: 14rem;
            object-fit: cover;
        }

        .save-btn {
           position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem;
            background: rgba(232, 232, 232, 0.95);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.5);
            transition: all 0.3s;
         }

        .save-btn:hover {
           background: #FFFFFF;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.8);
       
        }

        .watch-info {
            padding: 1.5rem;
        }

        .watch-name {
             font-size: 1.25rem;
            font-weight: bold;
            color: #E8E8E8;
            margin-bottom: 0.25rem;
        }

        .watch-brand {
            color: #C0C0C0;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .watch-price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .watch-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #E8E8E8;
        }

        .watch-stats {
            display: flex;
            align-items: center;
            gap: 0.75rem;
           color: #E8E8E8;
        }

        .watch-stat {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
        }

        .watch-specs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .watch-spec {
                 color: #B8B8B8;
        }

        .watch-spec span {
            font-weight: 600;
            margin-left: 0.25rem;
             color: #E8E8E8;
        }

        .watch-compare-btn {
             width: 100%;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #E8E8E8, #C0C0C0);
            color: #000;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(192, 192, 192, 0.3);
        
        }

        .watch-compare-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(192, 192, 192, 0.5);
        
        }

        /* Page Comparaison */
        .compare-card {
            position: relative;
        }

        .remove-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            padding: 0.5rem;
            background: #f87171;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;

        }

        .remove-btn:hover {
           background: #ef4444;
        }

        .remove-btn svg {
            stroke: white;
        }

        .compare-specs {
            padding: 1.5rem;
        }

        .compare-spec {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(192, 192, 192, 0.1);
        }

        .compare-spec:last-child {
            border-bottom: none;
        }

        .compare-spec-label {
             color: #B8B8B8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .compare-spec-value {
           font-weight: 600;
            color: #E8E8E8;
            font-size: 0.95rem;
        }

        .compare-spec-value.price {
            color: #C0C0C0;
            font-weight: bold;
        }

        .add-post-btn {
           position: fixed !important;
           right: 1rem !important;
           bottom: 1rem !important;
           top: auto !important;
           left: auto !important;
           width: 52px;
           height: 52px;
           padding: 0;
           display: inline-flex;
           align-items: center;
           justify-content: center;
           border-radius: 50%;
           background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 100%);
           color: #000;
           box-shadow: 0 10px 28px rgba(0,0,0,0.28);
           margin: 0 !important;
           z-index: 120;
           border: 1px solid rgba(255,255,255,0.06);
        }

        .add-post-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.32);
        }

        .add-post-btn svg {
            stroke: #000000;
            width: 20px;
            height: 20px;
        }


        /* responsive pour tablette*/
        @media (max-width: 1024px) and (min-width: 769px) {
            .watch-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* responsive pour mobile */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0.5rem 0.75rem;
            }

            .nav-inner {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }

            .nav-top {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 0;
            }

            .nav-logo {
                font-size: 1.25rem;
            }

            .nav-bottom {
                width: 100%;
                justify-content: center;
            }

            .nav-buttons {
                width: 100%;
                justify-content: space-between;
                gap: 0.25rem;
            }

            .nav-btn {
                flex: 1 1 0;
                padding: 0.5rem 0.25rem;
                font-size: 0.7rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.25rem;
                min-width: 0;
            }

            .nav-btn svg {
                width: 20px;
                height: 20px;
            }

            .nav-btn.icon-only {
                flex: 0 0 40px;
                width: 40px;
                height: 40px;
                min-width: 40px;
            }

            .account-menu {
                right: 0.5rem;
                min-width: 10rem;
            }

            .feed-container {
                padding: 1rem 0.5rem;
            }

            .post {
                margin-bottom: 1.25rem;
            }

            .post-header {
                padding: 0.75rem;
            }

            .post-actions {
                padding: 0.75rem;
            }

            .post-image {
                height: 18rem;
            }

            .page-container {
                padding: 1.5rem 0.75rem;
            }

            .page-title {
                font-size: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .watch-grid {
                grid-template-columns: 1fr;
                gap: 1.25rem;
            }

            .empty-state {
                padding: 3rem 1rem;
            }

            .empty-icon {
                width: 3rem;
                height: 3rem;
            }

            .empty-text {
                font-size: 1.1rem;
            }
        }

        /* responsive pour mobile */
        @media (max-width: 480px) {
            .nav-btn {
                padding: 0.4rem 0.15rem;
                font-size: 0.65rem;
                gap: 0.2rem;
            }

            .nav-btn svg {
                width: 18px;
                height: 18px;
            }

            .nav-btn.icon-only {
                width: 36px;
                height: 36px;
                min-width: 36px;
            }

            .post-image {
                height: 16rem;
            }

            .watch-image {
                height: 12rem;
            }

            .watch-info {
                padding: 1rem;
            }

            .watch-name {
                font-size: 1.1rem;
            }

            .watch-price {
                font-size: 1.25rem;
            }

            .compare-specs {
                padding: 1rem;
            }

            .post-avatar {
                width: 2rem;
                height: 2rem;
            }

            .post-user-info p:first-child {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div id="mainApp">
        <nav>
            <div class="nav-container">
                <div class="nav-inner">
                    <div class="nav-top">
                        <h1 class="nav-logo">WatchGram</h1>
                        <div class="nav-top-right">
                            <button class="nav-btn inactive icon-only" id="chatBtn"

                                    <polyline points="9 22 9 12 15 12 15 22"></polyline>

        <div id="feedPage" class="feed-container"></div>
        <div id="favoritesPage" class="page-container hidden"></div>
        <div id="comparePage" class="page-container hidden"></div>


        <button class="add-post-btn" id="fabPost" aria-label="Créer un post" onclick="goToPostPage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <script>
        // ============================================
        // API CONFIGURATION
        // ============================================
        const API_URL = 'http://localhost:3000/api'; // Docker backend URL

        function getAuthToken() {
            return localStorage.getItem('watchgram_token');
        }

        function getAuthHeaders() {
            const token = getAuthToken();
            return {
                'Content-Type': 'application/json',
                'Authorization': token ? `Bearer ${token}` : ''
            };
        }

        // ============================================
        // STATE VARIABLES
        // ============================================
        let userLikes = new Set();
        let userFavorites = new Set();
        let userComparisons = new Set();

        let currentPage = 'feed';
        let username = 'Guest';
        let isLoggedIn = false;
        let selectedWatches = [];
        let commentTexts = {};
        let currentImageIndex = {};
        let watches = [];

        // ============================================
        // DATA FETCHING FUNCTIONS
        // ============================================
        async function fetchPosts() {
            try {
                const response = await fetch(`${API_URL}/post`, {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('Failed to fetch posts');
                
                const posts = await response.json();
                
                if (isLoggedIn) {
                    await Promise.all([
                        fetchUserLikes(),
                        fetchUserFavorites(),
                        fetchUserComparisons()
                    ]);
                }
                
                watches = posts.map(post => ({
                    id: post.id,
                    name: post.name,
                    brand: post.brand,
                    owner: post.owner_username || 'Guest',
                    images: post.images || [],
                    price: post.price,
                    diameter: post.diameter,
                    thickness: post.thickness,
                    waterResistance: post.water_resistance,
                    movement: post.movement,
                    material: post.material,
                    likes: post.likes_count || 0,
                    isLiked: userLikes.has(post.id),
                    isSaved: userFavorites.has(post.id),
                    comments: []
                }));
                
                renderFeed();
            } catch (error) {
                console.error('Error fetching posts:', error);
                // Keep hardcoded data as fallback
                watches = [
                    {
                        id: 1,
                        name: "Rolex Submariner",
                        brand: "Rolex",
                        owner: "Guest",
                        images: ["https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=800&h=800&fit=crop"],
                        price: 8500,
                        diameter: 41,
                        thickness: 12.5,
                        waterResistance: 300,
                        movement: "Automatique",
                        material: "Acier inoxydable",
                        likes: 1247,
                        isLiked: false,
                        isSaved: false,
                        comments: []
                    }
                ];
                renderFeed();
            }
        }

        async function fetchUserLikes() {
            try {
                const response = await fetch(`${API_URL}/likes/user/me`, {
                    headers: getAuthHeaders()
                });
                if (response.ok) {
                    const posts = await response.json();
                    userLikes = new Set(posts.map(p => p.id));
                }
            } catch (error) {
                console.error('Error fetching user likes:', error);
            }
        }

        async function fetchUserFavorites() {
            try {
                const response = await fetch(`${API_URL}/favorites/user/me`, {
                    headers: getAuthHeaders()
                });
                if (response.ok) {
                    const posts = await response.json();
                    userFavorites = new Set(posts.map(p => p.id));
                }
            } catch (error) {
                console.error('Error fetching user favorites:', error);
            }
        }

        async function fetchUserComparisons() {
            try {
                const response = await fetch(`${API_URL}/compare/user/me`, {
                    headers: getAuthHeaders()
                });
                if (response.ok) {
                    const posts = await response.json();
                    userComparisons = new Set(posts.map(p => p.id));
                    selectedWatches = Array.from(userComparisons);
                }
            } catch (error) {
                console.error('Error fetching user comparisons:', error);
            }
        }

        // ============================================
        // PAGE NAVIGATION
        // ============================================
        function showPage(page) {
            currentPage = page;

            document.getElementById('feedPage').classList.add('hidden');
            document.getElementById('favoritesPage').classList.add('hidden');
            document.getElementById('comparePage').classList.add('hidden');

            document.getElementById('feedBtn').classList.remove('active');
            document.getElementById('feedBtn').classList.add('inactive');
            document.getElementById('favoritesBtn').classList.remove('active');
            document.getElementById('favoritesBtn').classList.add('inactive');
            document.getElementById('compareBtn').classList.remove('active');
            document.getElementById('compareBtn').classList.add('inactive');

            if (page === 'feed') {
                document.getElementById('feedPage').classList.remove('hidden');
                document.getElementById('feedBtn').classList.remove('inactive');
                document.getElementById('feedBtn').classList.add('active');
                renderFeed();
            } else if (page === 'favorites') {
                document.getElementById('favoritesPage').classList.remove('hidden');
                document.getElementById('favoritesBtn').classList.remove('inactive');
                document.getElementById('favoritesBtn').classList.add('active');
                renderFavorites();
            } else if (page === 'compare') {
                document.getElementById('comparePage').classList.remove('hidden');
                document.getElementById('compareBtn').classList.remove('inactive');
                document.getElementById('compareBtn').classList.add('active');
                renderComparison();
            }
        }

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderFeed() {
            const feedContainer = document.getElementById('feedPage');
            feedContainer.innerHTML = watches.map(watch => {
                const isOwner = isLoggedIn && watch.owner === username;
                return `
                <div class="post" data-watch-id="${watch.id}">
                    <div class="post-header">
                        <div class="post-header-left">
                            <div class="post-avatar">${watch.brand[0]}</div>
                            <div class="post-user-info">
                                <p>${watch.brand}</p>
                                <p>Officiel</p>
                            </div>
                        </div>
                        <div class="post-header-right">
                            <button class="post-more" onclick="togglePostMenu(${watch.id})" aria-label="Options du post">⋯</button>
                            ${isOwner ? `
                            <div class="post-menu hidden" id="postMenu-${watch.id}">
                                <button onclick="editPost(${watch.id})">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                    Modifier
                                </button>
                                <button class="delete" onclick="deletePost(${watch.id})">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    </svg>
                                    Supprimer
                                </button>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="post-image-container">
                        <img src="${watch.images[0]}" alt="${watch.name}" class="post-image" id="img-${watch.id}">
                            ${watch.images.length > 1 ? `
                                <button class="image-nav-btn prev" onclick="changeImage(${watch.id}, -1)" aria-label="Previous image">
                                    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                </button>
                                <button class="image-nav-btn next" onclick="changeImage(${watch.id}, 1)" aria-label="Next image">
                                    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"></polyline></svg>
                                </button>
                                <div class="image-indicators">
                                    ${watch.images.map((_, idx) => `
                                        <div class="indicator ${idx === 0 ? 'active' : 'inactive'}"></div>
                                    `).join('')}
                                </div>
                            ` : ''}
                    </div>
                    
                    <div class="post-actions">
                        <div class="actions-row">
                            <div class="actions-left">
                                <button class="action-btn" onclick="toggleLike(${watch.id})">
                                    <svg class="icon ${watch.isLiked ? 'liked' : ''}" viewBox="0 0 24 24">
                                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                    </svg>
                                </button>
                                <button class="action-btn">
                                    <svg class="icon" viewBox="0 0 24 24">
                                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                </button>
                                <button class="action-btn">
                                    <svg class="icon" viewBox="0 0 24 24">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>
                            <div>
                                <button class="action-btn" onclick="toggleSave(${watch.id})">
                                    <svg class="icon ${watch.isSaved ? 'saved' : ''}" viewBox="0 0 24 24">
                                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        
                        <div class="likes-count">${watch.likes} Like</div>
                        
                        <div class="post-description">
                            <span class="brand">${watch.brand}</span>
                            <span class="details"> ${watch.name} - ${watch.price}€ - ${watch.diameter}mm - ${watch.movement}</span>
                        </div>
                        
                        <div class="comments-section">
                            ${watch.comments.slice(0, 2).map(comment => `
                                <div class="comment">
                                    <span class="username">${comment.user}</span>
                                    <span class="text">${comment.text}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="post-time">Il y a 3 heures</div>
                        
                        <div class="add-comment">
                            <input type="text" placeholder="Ajouter un commentaire..." 
                                   id="comment-${watch.id}" 
                                   oninput="updateCommentBtn(${watch.id})">
                            <button class="send-btn inactive" id="send-${watch.id}" onclick="addComment(${watch.id})">
                                Publier
                            </button>
                        </div>
                        
                        <button class="compare-btn ${userComparisons.has(watch.id) ? 'added' : 'not-added'}" 
                                onclick="toggleCompare(${watch.id})">
                            ${userComparisons.has(watch.id) ? '✓ Ajouté à la comparaison' : '+ Ajouter à la comparaison'}
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        async function renderFavorites() {
            if (!isLoggedIn) {
                document.getElementById('favoritesPage').innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="2" d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p class="empty-text">Connectez-vous pour voir vos favoris</p>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_URL}/favorites/user/me`, {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('Failed to fetch favorites');
                
                const savedWatches = await response.json();
                const favContainer = document.getElementById('favoritesPage');

                if (savedWatches.length === 0) {
                    favContainer.innerHTML = `
                        <div class="empty-state">
                            <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-width="2" d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <p class="empty-text">Aucune montre sauvegardée</p>
                        </div>
                    `;
                } else {
                    favContainer.innerHTML = `
                        <h2 class="page-title">Mes Montres Favorites</h2>
                        <div class="watch-grid">
                            ${savedWatches.map(watch => `
                                <div class="watch-card">
                                    <div class="watch-image-container">
                                        <img src="${watch.images[0] || ''}" alt="${watch.name}" class="watch-image">
                                        <button class="save-btn" onclick="toggleSave(${watch.id})">
                                            <svg width="20" height="20" fill="gold" stroke="gold" stroke-width="2" viewBox="0 0 24 24">
                                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                                            </svg>
                                        </button>
                                    </div>
                                    <div class="watch-info">
                                        <h3 class="watch-name">${watch.name}</h3>
                                        <p class="watch-brand">${watch.brand}</p>
                                        <div class="watch-price-row">
                                            <span class="watch-price">${watch.price}€</span>
                                            <div class="watch-stats">
                                                <span class="watch-stat">
                                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                                    </svg>
                                                    ${watch.likes_count || 0}
                                                </span>
                                            </div>
                                        </div>
                                        <div class="watch-specs">
                                            <div class="watch-spec">Diamètre:<span>${watch.diameter || 'N/A'}mm</span></div>
                                            <div class="watch-spec">Épaisseur:<span>${watch.thickness || 'N/A'}mm</span></div>
                                            <div class="watch-spec">Étanchéité:<span>${watch.water_resistance || 'N/A'}m</span></div>
                                            <div class="watch-spec">Mouvement:<span>${watch.movement || 'N/A'}</span></div>
                                        </div>
                                        <button class="watch-compare-btn" onclick="toggleCompare(${watch.id})">
                                            ${userComparisons.has(watch.id) ? '✓ En comparaison' : 'Comparer'}
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error rendering favorites:', error);
            }
        }

        async function renderComparison() {
            if (!isLoggedIn) {
                document.getElementById('comparePage').innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <polyline stroke-width="2" points="11 2 2 2 2 7"></polyline>
                            <polyline stroke-width="2" points="13 22 22 22 22 17"></polyline>
                            <line stroke-width="2" x1="2" y1="13" x2="8" y2="7"></line>
                            <line stroke-width="2" x1="22" y1="11" x2="16" y2="17"></line>
                        </svg>
                        <p class="empty-text">Connectez-vous pour comparer des montres</p>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_URL}/compare/user/me`, {
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('Failed to fetch comparisons');
                
                const compareWatches = await response.json();
                const compareContainer = document.getElementById('comparePage');

                if (compareWatches.length === 0) {
                    compareContainer.innerHTML = `
                        <div class="empty-state">
                            <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <polyline stroke-width="2" points="11 2 2 2 2 7"></polyline>
                                <polyline stroke-width="2" points="13 22 22 22 22 17"></polyline>
                                <line stroke-width="2" x1="2" y1="13" x2="8" y2="7"></line>
                                <line stroke-width="2" x1="22" y1="11" x2="16" y2="17"></line>
                            </svg>
                            <p class="empty-text">Aucune montre à comparer</p>
                        </div>
                    `;
                } else {
                    compareContainer.innerHTML = `
                        <h2 class="page-title">Comparaison de Montres (${compareWatches.length}/5)</h2>
                        <div class="watch-grid">
                            ${compareWatches.map(watch => `
                                <div class="watch-card compare-card">
                                    <button class="remove-btn" onclick="toggleCompare(${watch.id})">
                                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                    </button>
                                    <div class="watch-image-container">
                                        <img src="${watch.images[0] || ''}" alt="${watch.name}" class="watch-image">
                                    </div>
                                    <div class="watch-info">
                                        <h3 class="watch-name">${watch.name}</h3>
                                        <p class="watch-brand">${watch.brand}</p>
                                    </div>
                                    <div class="compare-specs">
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Prix</span>
                                            <span class="compare-spec-value price">${watch.price}€</span>
                                        </div>
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Diamètre</span>
                                            <span class="compare-spec-value">${watch.diameter || 'N/A'}mm</span>
                                        </div>
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Épaisseur</span>
                                            <span class="compare-spec-value">${watch.thickness || 'N/A'}mm</span>
                                        </div>
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Étanchéité</span>
                                            <span class="compare-spec-value">${watch.water_resistance || 'N/A'}m</span>
                                        </div>
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Mouvement</span>
                                            <span class="compare-spec-value">${watch.movement || 'N/A'}</span>
                                        </div>
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Matériau</span>
                                            <span class="compare-spec-value">${watch.material || 'N/A'}</span>
                                        </div>
                                        <div class="compare-spec">
                                            <span class="compare-spec-label">Popularité</span>
                                            <span class="compare-spec-value">${watch.likes_count || 0} Likes</span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error rendering comparison:', error);
            }
        }

        // ============================================
        // INTERACTION FUNCTIONS (WITH API INTEGRATION)
        // ============================================
        async function toggleLike(id) {
            if (!isLoggedIn) {
                alert('Veuillez vous connecter pour aimer un post');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/likes/${id}`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('Failed to toggle like');
                
                const data = await response.json();
                
                const watch = watches.find(w => w.id === id);
                if (watch) {
                    watch.isLiked = data.liked;
                    watch.likes = data.likes;
                }
                
                if (data.liked) {
                    userLikes.add(id);
                } else {
                    userLikes.delete(id);
                }
                
                renderFeed();
            } catch (error) {
                console.error('Error toggling like:', error);
                alert('Erreur lors du like');
            }
        }

        async function toggleSave(id) {
            if (!isLoggedIn) {
                alert('Veuillez vous connecter pour sauvegarder un post');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/favorites/${id}`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) throw new Error('Failed to toggle favorite');
                
                const data = await response.json();
                
                const watch = watches.find(w => w.id === id);
                if (watch) {
                    watch.isSaved = data.favorited;
                }
                
                if (data.favorited) {
                    userFavorites.add(id);
                } else {
                    userFavorites.delete(id);
                }
                
                updateCounts();
                if (currentPage === 'feed') renderFeed();
                else if (currentPage === 'favorites') renderFavorites();
            } catch (error) {
                console.error('Error toggling favorite:', error);
                alert('Erreur lors de la sauvegarde');
            }
        }

        async function toggleCompare(id) {
            if (!isLoggedIn) {
                alert('Veuillez vous connecter pour comparer des montres');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/compare/${id}/toggle`, {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    if (response.status === 400 && error.error.includes('full')) {
                        alert('Liste de comparaison pleine (maximum 5 montres)');
                    } else {
                        throw new Error(error.error || 'Failed to toggle comparison');
                    }
                    return;
                }
                
                const data = await response.json();
                
                if (data.inComparison) {
                    userComparisons.add(id);
                    if (!selectedWatches.includes(id)) {
                        selectedWatches.push(id);
                    }
                } else {
                    userComparisons.delete(id);
                    const idx = selectedWatches.indexOf(id);
                    if (idx !== -1) {
                        selectedWatches.splice(idx, 1);
                    }
                }
                
                updateCounts();
                if (currentPage === 'feed') renderFeed();
                else if (currentPage === 'favorites') renderFavorites();
                else if (currentPage === 'compare') renderComparison();
            } catch (error) {
                console.error('Error toggling comparison:', error);
                alert('Erreur lors de l\'ajout à la comparaison');
            }
        }

        async function updateCounts() {
            if (!isLoggedIn) {
                document.getElementById('favCount').textContent = '0';
                document.getElementById('compareCount').textContent = '0';
                return;
            }
            
            try {
                const [favResponse, compareResponse] = await Promise.all([
                    fetch(`${API_URL}/favorites/count`, { headers: getAuthHeaders() }),
                    fetch(`${API_URL}/compare/count`, { headers: getAuthHeaders() })
                ]);
                
                if (favResponse.ok) {
                    const favData = await favResponse.json();
                    document.getElementById('favCount').textContent = favData.count || '0';
                }
                
                if (compareResponse.ok) {
                    const compareData = await compareResponse.json();
                    document.getElementById('compareCount').textContent = compareData.count || '0';
                }
            } catch (error) {
                console.error('Error updating counts:', error);
            }
        }

        // ============================================
        // OTHER HELPER FUNCTIONS (UNCHANGED)
        // ============================================
        function togglePostMenu(watchId) {
            const menu = document.getElementById(`postMenu-${watchId}`);
            if (!menu) return;
            
            document.querySelectorAll('.post-menu').forEach(m => {
                if (m.id !== `postMenu-${watchId}`) {
                    m.classList.add('hidden');
                }
            });
            
            menu.classList.toggle('hidden');
        }

        function editPost(watchId) {
            const watch = watches.find(w => w.id === watchId);
            if (!watch || watch.owner !== username) return;
            
            const menu = document.getElementById(`postMenu-${watchId}`);
            if (menu) menu.classList.add('hidden');
            
            alert(`Modifier la publication: ${watch.name}\n(Cette fonctionnalité sera implémentée)`);
        }

        async function deletePost(watchId) {
            const watch = watches.find(w => w.id === watchId);
            if (!watch || watch.owner !== username) return;
            
            const menu = document.getElementById(`postMenu-${watchId}`);
            if (menu) menu.classList.add('hidden');
            
            if (confirm(`Êtes-vous sûr de vouloir supprimer "${watch.name}" ?`)) {
                try {
                    const response = await fetch(`${API_URL}/post/${watchId}`, {
                        method: 'DELETE',
                        headers: getAuthHeaders()
                    });

                    if (response.ok) {
                        watches = watches.filter(w => w.id !== watchId);
                        const idx = selectedWatches.indexOf(watchId);
                        if (idx !== -1) selectedWatches.splice(idx, 1);
                        
                        updateCounts();
                        renderFeed();
                    } else {
                        alert('Erreur lors de la suppression');
                    }
                } catch (error) {
                    console.error('Delete error:', error);
                    alert('Erreur lors de la suppression');
                }
            }
        }

        function goToPostPage() {
            if (!isLoggedIn) {
                window.location.href = "creataccount.html";
            } else {
                window.location.href = "post.html";
            }
        }

        function changeImage(watchId, direction) {
            const watch = watches.find(w => w.id === watchId);
            if (!currentImageIndex[watchId]) currentImageIndex[watchId] = 0;

            currentImageIndex[watchId] = (currentImageIndex[watchId] + direction + watch.images.length) % watch.images.length;

            document.getElementById(`img-${watchId}`).src = watch.images[currentImageIndex[watchId]];

            const indicators = document.querySelectorAll(`[data-watch-id="${watchId}"] .indicator`);
            indicators.forEach((ind, idx) => {
                ind.className = idx === currentImageIndex[watchId] ? 'indicator active' : 'indicator inactive';
            });
        }

        function updateCommentBtn(watchId) {
            const input = document.getElementById(`comment-${watchId}`);
            const btn = document.getElementById(`send-${watchId}`);

            if (input.value.trim()) {
                btn.classList.remove('inactive');
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
                btn.classList.add('inactive');
            }
        }

        function addComment(watchId) {
            const input = document.getElementById(`comment-${watchId}`);
            if (input.value.trim()) {
                const watch = watches.find(w => w.id === watchId);
                watch.comments.push({
                    id: Date.now(),
                    user: username,
                    text: input.value,
                    time: "À l'instant"
                });
                input.value = '';
                renderFeed();
            }
        }

        function toggleAccountMenu() {
            const menu = document.getElementById('accountMenu');
            if (!menu) return;
            menu.classList.toggle('hidden');
        }

        function updateAccountMenu() {
            const menu = document.getElementById('accountMenu');
            const btn = document.getElementById('accountBtn');
            if (!menu || !btn) return;

            const displayName = isLoggedIn ? username : 'Guest';
            let inner = `<div class="account-name">${displayName}</div>`;

            if (!isLoggedIn) {
                inner += `
                    <button onclick="window.location.href='login.html'">
                        <svg style="width:16px;height:16px;display:inline-block;margin-right:8px;vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                            <polyline points="10 17 15 12 10 7"></polyline>
                            <line x1="15" y1="12" x2="3" y2="12"></line>
                        </svg>
                        Log in
                    </button>
                    <button onclick="window.location.href='creataccount.html'">
                        <svg style="width:16px;height:16px;display:inline-block;margin-right:8px;vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <line x1="20" y1="8" x2="20" y2="14"></line>
                            <line x1="23" y1="11" x2="17" y2="11"></line>
                        </svg>
                        Create account
                    </button>
                `;
                btn.classList.remove('active');
                btn.classList.add('inactive');
            } else {
                inner += `
                    <button onclick="logout()">
                        <svg style="width:16px;height:16px;display:inline-block;margin-right:8px;vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Log out
                    </button>
                `;
                btn.classList.add('active');
                btn.classList.remove('inactive');
            }

            menu.innerHTML = inner;
        }

        function logout() {
            localStorage.removeItem('watchgram_currentUser');
            localStorage.removeItem('watchgram_username');
            localStorage.removeItem('watchgram_token');
            isLoggedIn = false;
            username = 'Guest';
            userLikes.clear();
            userFavorites.clear();
            userComparisons.clear();
            selectedWatches = [];
            updateAccountMenu();
            document.getElementById('accountMenu').classList.add('hidden');
            fetchPosts();
        }

        document.addEventListener('click', function (e) {
            const accountMenu = document.getElementById('accountMenu');
            const accountBtn = document.getElementById('accountBtn');
            if (accountMenu && accountBtn) {
                if (!accountMenu.classList.contains('hidden')) {
                    if (!accountMenu.contains(e.target) && !accountBtn.contains(e.target)) {
                        accountMenu.classList.add('hidden');
                    }
                }
            }
            
            const postMenus = document.querySelectorAll('.post-menu');
            const postMoreBtns = document.querySelectorAll('.post-more');
            
            let clickedPostMenu = false;
            postMenus.forEach(menu => {
                if (menu.contains(e.target)) clickedPostMenu = true;
            });
            
            let clickedPostMoreBtn = false;
            postMoreBtns.forEach(btn => {
                if (btn.contains(e.target)) clickedPostMoreBtn = true;
            });
            
            if (!clickedPostMenu && !clickedPostMoreBtn) {
                postMenus.forEach(menu => {
                    menu.classList.add('hidden');
                });
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        async function initApp() {
            const storedToken = localStorage.getItem('watchgram_token');
            const storedName = localStorage.getItem('watchgram_username');
            
            if (storedToken && storedName) {
                isLoggedIn = true;
                username = storedName;
            } else {
                isLoggedIn = false;
                username = 'Guest';
            }
            
            updateAccountMenu();
            await fetchPosts();
            await updateCounts();
            showPage('feed');
        }

        // Start the app
        initApp();
    </script>
</body>

</html>
