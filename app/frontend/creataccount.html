<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/icons/watchgram_logo2.png">
    <title>WatchGram - Créer un compte</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f1419 100%);
            position: relative;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #E8E8E8;
        }

        .signup-container {
            background: rgba(30, 30, 45, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
            box-shadow: 0 0 30px rgba(192, 192, 192, 0.2);
            border: 1px solid rgba(192, 192, 192, 0.2);
            max-width: 28rem;
            width: 100%;
            overflow: hidden;
        }

        .signup-header {
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%, #A9A9A9 100%);
            padding: 2rem;
            text-align: center;
            color: #000;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
        }

        .tagline {
            font-size: 0.875rem;
            opacity: 0.9;
        }

        .signup-form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #C0C0C0;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #333333;
            background: rgba(255,255,255,0.02);
            color: #EAEAEA;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .form-input.error {
            border-color: #ff4d4d;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 0.75rem;
            display: none;
            margin-top: 0.25rem;
        }

        .error-message.show {
            display: block;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: #A9A9A9;
        }

        .conditions-btn {
            margin-left: auto;
            font-size: 0.75rem;
            color: #A9A9A9;
            text-decoration: underline;
            cursor: pointer;
        }

        .conditions-btn:hover {
            color: #E8E8E8;
            text-shadow: 0 0 5px rgba(192,192,192,0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #E8E8E8 0%, #C0C0C0 50%, #A9A9A9 100%);
            color: #000;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }

        .submit-btn:disabled {
            background: #555;
            cursor: not-allowed;
            color: #ccc;
        }

        .login-link {
            text-align: center;
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        .login-link a {
            color: #C0C0C0;
            font-weight: 600;
            text-decoration: none;
        }

        .success-message {
            background: #064e3b;
            border: 1px solid #10b981;
            color: #d1fae5;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .general-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .general-error.show {
            display: block;
        }
    </style>
</head>

<body>

<div class="signup-container">
    <div class="signup-header">
        <h1 class="logo">WatchGram</h1>
        <p class="tagline">Rejoignez la communauté des passionnés de montres</p>
    </div>

    <form class="signup-form" id="signupForm">

        <div class="success-message" id="successMessage">
            ✓ Compte créé avec succès ! Redirection...
        </div>

        <div class="general-error" id="generalError"></div>

        <div class="form-group">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" id="username" class="form-input" required minlength="3">
            <span class="error-message" id="usernameError">Minimum 3 caractères</span>
        </div>

        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-input" required>
            <span class="error-message" id="emailError">Email invalide</span>
        </div>

        <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" id="password" class="form-input" required minlength="8">
            <span class="error-message" id="passwordError">Minimum 8 caractères</span>
        </div>

        <div class="form-group">
            <label class="form-label">Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" class="form-input" required>
            <span class="error-message" id="confirmError">Les mots de passe ne correspondent pas</span>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" required>
            <label for="terms">J'accepte les conditions</label>

            <a href="condition.html" class="conditions-btn">Voir les conditions</a>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
            Créer mon compte
        </button>

        <div class="login-link">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>

    </form>
</div>

<script>
    const API_URL = 'http://localhost:3000/api'; // Change this to your backend URL
    const form = document.getElementById('signupForm');
    const submitBtn = document.getElementById('submitBtn');
    const generalError = document.getElementById('generalError');

    function showGeneralError(message) {
        generalError.textContent = message;
        generalError.classList.add('show');
        setTimeout(() => {
            generalError.classList.remove('show');
        }, 5000);
    }

    function validateForm() {
        let isValid = true;

        // Reset error states
        document.querySelectorAll('.form-input').forEach(input => {
            input.classList.remove('error');
        });
        document.querySelectorAll('.error-message').forEach(msg => {
            msg.classList.remove('show');
        });

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        // Validate username
        if (username.length < 3) {
            document.getElementById('username').classList.add('error');
            document.getElementById('usernameError').classList.add('show');
            isValid = false;
        }

        // Validate email
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            document.getElementById('email').classList.add('error');
            document.getElementById('emailError').classList.add('show');
            isValid = false;
        }

        // Validate password
        if (password.length < 8) {
            document.getElementById('password').classList.add('error');
            document.getElementById('passwordError').classList.add('show');
            isValid = false;
        }

        // Validate password match
        if (password !== confirm) {
            document.getElementById('confirmPassword').classList.add('error');
            document.getElementById('confirmError').classList.add('show');
            isValid = false;
        }

        return isValid;
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        if (!validateForm()) {
            return;
        }

        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.textContent = "Création en cours...";

        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Échec de la création du compte');
            }

            // Show success message
            document.getElementById('successMessage').classList.add('show');

            // Auto-login after registration
            const loginResponse = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });

            const loginData = await loginResponse.json();

            if (loginResponse.ok) {
                // Store authentication data
                localStorage.setItem('watchgram_token', loginData.token);
                localStorage.setItem('watchgram_username', loginData.username);
                localStorage.setItem('watchgram_currentUser', email);

                // Redirect to home page
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            } else {
                // If auto-login fails, redirect to login page
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }

        } catch (error) {
            console.error('Registration error:', error);
            showGeneralError(error.message || 'Erreur lors de la création du compte');
            submitBtn.disabled = false;
            submitBtn.textContent = "Créer mon compte";
        }
    });

    // Real-time validation
    document.getElementById('username').addEventListener('input', function() {
        if (this.value.length >= 3) {
            this.classList.remove('error');
            document.getElementById('usernameError').classList.remove('show');
        }
    });

    document.getElementById('email').addEventListener('input', function() {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (emailRegex.test(this.value)) {
            this.classList.remove('error');
            document.getElementById('emailError').classList.remove('show');
        }
    });

    document.getElementById('password').addEventListener('input', function() {
        if (this.value.length >= 8) {
            this.classList.remove('error');
            document.getElementById('passwordError').classList.remove('show');
        }
    });

    document.getElementById('confirmPassword').addEventListener('input', function() {
        const password = document.getElementById('password').value;
        if (this.value === password) {
            this.classList.remove('error');
            document.getElementById('confirmError').classList.remove('show');
        }
    });
</script>

</body>
</html>
