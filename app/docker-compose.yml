services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: watchgram_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-watchgram}
      MYSQL_USER: ${DB_USER:-watchgram_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/mysql
      - ./global.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - watchgram_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API with Socket.IO
  backend:
    build: ./backend
    container_name: watchgram_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-watchgram}
      DB_USER: ${DB_USER:-watchgram_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DIALECT: mysql
      JWT_SECRET: ${JWT_SECRET:-your_secret_key_here}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/script/src:/app/script/src
    networks:
      - watchgram_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build: ./frontend
    container_name: watchgram_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - watchgram_network

volumes:
  db_data:
    driver: local

networks:
  watchgram_network:
    driver: bridge